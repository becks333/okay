<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales - Block Factory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Habib Blocks</h2>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="production.html">🏭 Production</a>
        <a href="sales.html">💰 Sales</a>
        <a href="expenses.html">📉 Expenses</a>
        <a href="reports.html">📋 Reports</a>

        <!-- SYSTEM SETTINGS INITIALIZER PANEL (SYNCED WITH SCRIPT) -->
        <div style="margin-top: 40px; border-top: 1px solid #374151; padding-top: 15px;">
            <button id="toggleSettingsBtn" style="background: none; border: none; color: #9ca3af; width: 100%; text-align: left; padding: 10px 5px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; font-family: inherit;">
                <span>⚙️ Factory Settings</span>
                <span id="dropdownArrow" style="font-size: 10px;">▼</span>
            </button>
            
            <div id="settingsPanel" style="display: none; padding: 10px 5px 0 5px; transition: all 0.2s ease;">
                <div style="background: #1e293b; padding: 10px; border-radius: 6px; border: 1px solid #475569; margin-bottom: 12px;">
                    <label for="startingCapital" style="display: block; color: #cbd5e1; font-size: 11px; font-weight: bold; margin-bottom: 6px;">💰 Opening Capital (GH₵):</label>
                    <div style="display: flex; gap: 6px;">
                        <input type="number" id="startingCapital" min="0" step="0.01" placeholder="0.00" style="flex: 1; padding: 6px; font-size: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 4px; color: #ffffff;">
                        <button id="saveCapitalBtn" style="background: #2563eb; color: #ffffff; border: none; padding: 0 10px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer;">Set</button>
                    </div>
                </div>

                <p style="color: #6b7280; font-size: 11px; margin: 0 0 10px 0; line-height: 1.3; text-align: left;">Danger Zone: Purges all logs from the active cloud storage sheets.</p>
                <button id="resetDbBtn" style="background-color: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 12px; transition: background 0.2s;">
                    🗑️ Clear Live Data
                </button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <header>
            <h1>Sales Entry</h1>
        </header>

        <div class="form-container">
            <form id="salesForm">
                <div class="form-group">
                    <label for="saleDate">📅 Sale Date <span style="color:#ef4444">*</span></label>
                    <input type="date" id="saleDate" name="saleDate" required>
                </div>

                <div class="form-group">
                    <label for="customerName">👤 Customer Name <span style="color:#ef4444">*</span></label>
                    <input type="text" id="customerName" name="customerName" placeholder="Enter customer name" required>
                </div>

                <div class="form-group">
                    <label for="blockType">🧱 Block Type <span style="color:#ef4444">*</span></label>
                    <select id="blockType" name="blockType" required>
                        <option value="">-- Select block type --</option>
                        <option value="Hollow 5 inches">Hollow 5 inches</option>
                        <option value="Solid 5 inches">Solid 5 inches</option>
                        <option value="Solid 6 inches">Solid 6 inches</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="quantity">📦 Quantity <span style="color:#ef4444">*</span></label>
                    <input type="number" id="quantity" name="quantity" min="1" placeholder="Enter quantity" required>
                </div>

                <div class="form-group">
                    <label for="price">💵 Unit Price (GH₵) <span style="color:#ef4444">*</span></label>
                    <input type="number" id="price" name="unitPrice" min="0" step="0.01" placeholder="Enter price per unit" required>
                </div>

                <div class="form-group">
                    <label for="total">💰 Total Amount (GH₵)</label>
                    <input type="number" id="total" name="totalAmount" readonly style="background:#f0f9ff; cursor:not-allowed">
                </div>

                <button type="submit">✓ Save Sale</button>
            </form>
        </div>
    </div>

   <script type="module" src="script.js"></script>
</body>
</html>
