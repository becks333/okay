<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - Block Factory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Habib Blocks</h2>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="production.html">🏭 Production</a>
        <a href="sales.html">💰 Sales</a>
        <a href="expenses.html">📉 Expenses</a>
        <a href="reports.html">📋 Reports</a>
    </div>

    <div class="main-content">
        <header>
            <h1>Expenses Entry</h1>
        </header>

        <div class="form-container">
            <form id="expensesForm">
                <div class="form-group">
                    <label for="expenseDate">📅 Expense Date <span style="color:#ef4444">*</span></label>
                    <input type="date" id="expenseDate" name="expenseDate" required>
                </div>

                <div class="form-group">
                    <label for="expenseType">📂 Expense Type <span style="color:#ef4444">*</span></label>
                    <select id="expenseType" name="expenseType" required>
                        <option value="">-- Select expense type --</option>
                        <option value="Cement">🛢️ Cement</option>
                        <option value="Labour">👷 Labour</option>
                        <option value="Fuel">⛽ Fuel</option>
                        <option value="Transport">🚚 Transport</option>
                        <option value="Maintenance">🔧 Maintenance</option>
                        <option value="Other">📌 Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">📝 Description <span style="color:#ef4444">*</span></label>
                    <input type="text" id="description" name="description" placeholder="e.g., 50 bags of cement" required>
                </div>

                <div class="form-group">
                    <label for="bagsPurchased">🛒 Bags Purchased (If Cement)</label>
                    <input type="number" id="bagsPurchased" name="bagsPurchased" min="0" placeholder="e.g., 50">
                </div>

                <div class="form-group">
                    <label for="amount">💵 Amount (GH₵) <span style="color:#ef4444">*</span></label>
                    <input type="number" id="amount" name="amount" min="0" step="0.01" placeholder="Enter amount" required>
                </div>

                <div class="form-group">
                    <label for="paymentType">💳 Payment Type <span style="color:#ef4444">*</span></label>
                    <select id="paymentType" name="paymentType" required>
                        <option value="">-- Select payment type --</option>
                        <option value="Cash">💵 Cash</option>
                        <option value="Mobile Money">📱 Mobile Money</option>
                        <option value="Bank Transfer">🏦 Bank Transfer</option>
                    </select>
                </div>

                <button type="submit">✓ Save Expense</button>
            </form>
        </div>

        <header style="margin-top: 28px;">
            <h1>📉 Logged Expense Records</h1>
        </header>

        <div class="form-container" style="margin-bottom: 40px;">
            <table id="expensesTable" style="width:100%; border-collapse: collapse;">
                <thead>
                    <tr style="background-color: #1e40af; border-bottom: 2px solid #1d4ed8;">
                        <th style="padding: 12px; text-align: left; color: #ffffff !important; font-weight: bold;">📅 Date</th>
                        <th style="padding: 12px; text-align: left; color: #ffffff !important; font-weight: bold;">📂 Category</th>
                        <th style="padding: 12px; text-align: left; color: #ffffff !important; font-weight: bold;">📝 Description</th>
                        <th style="padding: 12px; text-align: left; color: #ffffff !important; font-weight: bold;">💳 Method</th>
                        <th style="padding: 12px; text-align: left; color: #ffffff !important; font-weight: bold;">💵 Amount</th>
                    </tr>
                </thead>
                <tbody id="expensesTableBody">
                    <tr>
                        <td colspan="5" style="text-align:center; padding:20px; color:#888;">
                            Loading live expense records...
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr style="background-color: #f8fafc; border-top: 3px solid #1e40af; font-weight: bold;">
                        <td colspan="4" style="padding: 14px; text-align: right; color: #1e293b; font-size: 15px;">Total Money Spent:</td>
                        <td id="tableExpensesTotal" style="padding: 14px; text-align: left; color: #dc2626; font-size: 16px;">GH₵ 0.00</td>
                    </tr>
                    <tr style="background-color: #f8fafc; border-top: 1px solid #e2e8f0; font-weight: bold;">
                        <td colspan="4" style="padding: 14px; text-align: right; color: #1e293b; font-size: 15px;">Total Money Left (Net Balance):</td>
                        <td id="tableNetBalanceTotal" style="padding: 14px; text-align: left; color: #16a34a; font-size: 16px;">GH₵ 0.00</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
